# medialab DEV overlay - a non-interfering development stack.
#
# Run alongside (or instead of) prod without collisions: a separate compose
# project name, a different host port, a throwaway containerized qBittorrent, a
# dev Discord bot with its own token, and a test media dir. Prod's host apps
# (qBittorrent, Jellyfin) and prod containers are untouched.
#
# Usage (PowerShell or bash), from the workspace root:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Stop prod first if it binds the same host apps you are testing against.
#
# Namespacing: this file sets no `name:`; invoke with the project name so all
# dev containers/network/volumes are prefixed and never clash with prod:
#   COMPOSE_PROJECT_NAME=medialab-dev docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# (a .env at the root with COMPOSE_PROJECT_NAME=medialab-dev also works.)
#
# Scope of this overlay (item 19 live verification):
#   WORKS: TMDB search, the TV season/episode scope picker, scoped torrent
#          search (bot -> orchestrator -> torrent-downloader -> qBittorrent
#          search + TMDB). None of that path needs VPN.
#   DOES NOT WORK YET (deferred to the full-containerization spec):
#     - POST /download: torrent-downloader hard-blocks unless qBittorrent is
#       bound to the NordLynx VPN interface (is_vpn_bound). A container
#       qBittorrent has no such interface, so downloads are rejected by design.
#       A gluetun VPN sidecar + a dev-only VPN-check relaxation is the follow-up.
#     - qBittorrent WebUI auth: torrent-downloader sends a Bearer key; the
#       linuxserver qBittorrent WebUI uses user/pass. Search plugin auth may
#       need alignment on first run (set QB_API_KEY / WebUI creds to match).
#     - Jellyfin register/scan: no Jellyfin container here; medialab-jellyfin
#       points at a dev value and its calls will fail until a Jellyfin container
#       or a real host target is provided. Not on the item-19 search path.

services:
  qbittorrent-dev:
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=8080
    volumes:
      - "qbittorrent-dev-config:/config"
      - "${MEDIA_HOST_DIR_DEV}:/downloads"
    ports:
      # Exposed so you can open the WebUI to configure search plugins / creds.
      - "8090:8080"
    networks:
      - medialab
    restart: unless-stopped

  torrent-downloader:
    # Reuse the prod .env for the TMDB + API keys, override only the qBittorrent
    # target so it talks to the dev container instead of host.docker.internal.
    environment:
      - QB_HOST=qbittorrent-dev
      - QB_PORT=8080
    depends_on:
      - qbittorrent-dev

  medialab-orchestrator:
    # Different host port so it never fights prod's 8000 bind.
    ports:
      - "8001:8000"
    volumes:
      # Test media dir + an isolated dev job store (separate named volume).
      - "${MEDIA_HOST_DIR_DEV}:/media"
      - "orchestrator-dev-data:/app/data"

  medialab-bot:
    # The one identity that MUST fork: a second Discord bot token. Two processes
    # on one token get disconnected by Discord. Point this at the dev bot's own
    # .env.dev (separate DISCORD_TOKEN + DISCORD_GUILD_ID, same ORCHESTRATOR_URL
    # since it resolves inside the dev network to the dev gateway container).
    env_file:
      - ./medialab-bot/.env.dev

volumes:
  qbittorrent-dev-config:
  orchestrator-dev-data:
